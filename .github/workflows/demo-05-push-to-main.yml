name: Demo 05 - Push To Main

on:
  workflow_dispatch:   # Allows manual runs from GitHub UI
  push:
    branches: 
      - main           # Triggers on push to main branch
  
jobs:
  build-app:
    name: "Build App"
    runs-on: ubuntu-latest    # Use latest Ubuntu runner
    
    steps:
    - uses: actions/checkout@v2            # Step 1: Checkout code

    - name: Setup .NET Core 5              # Step 2: Setup .NET core SDK
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.x

    - name: Install libssl3              # Step 2.1: Fix for missing libssl needed by .NET
      run: sudo apt-get update && sudo apt-get install -y libssl3

    - name: Install dependencies           # Step 3: Restore NuGet packages
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"

    - name: Build                          # Step 4: Build project in Release mode
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore

    - name: Test                           # Step 5: Run tests and output .trx log
      run: |
        dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Test Report                    # Step 6: Visualize test results in GitHub UI
      uses: dorny/test-reporter@v1.5.0
      if: success() || failure()    # always run this step
      with:
        name: XUnit Tests                          # Name for report
        path: ${{ github.workspace }}/mywebapp/tests/TestResults/*.trx
        reporter: dotnet-trx
    
    - name: Publish                        # Step 7: Publish build outputs for deployment
      run: dotnet publish "${{ github.workspace }}/mywebapp/src/mywebapp.csproj" -c Release -o mywebapp
    
    # --- FIXED STEP BELOW: Upload artifact using latest version ---
    - name: Upload a Build Artifact        # Step 8: Upload published build as an artifact
      uses: actions/upload-artifact@v7.0.0     # UPDATED to v7 as required by GitHub!
      with:
        name: mywebappbuildartifacts       # Artifact name
        path: mywebapp/**                  # Upload all build outputs
        if-no-files-found: error           # Fail if nothing found
        retention-days: 90                 # Artifact retention in days
    


  deploy-DEV:
    name: "Deploy To Azure DEV env"
    runs-on: ubuntu-latest
    needs:
      - build-app
    environment:
      name: 'DEMO05_DEV'
      url: 'https://mywebapp-actions-dev.azurewebsites.net'
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup .NET Core 5
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.x
    
    - name: 'Login via Azure CLI'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact      # Download artifact for deployment
      uses: actions/download-artifact@v2.0.8
      with:
        name: 'mywebappbuildartifacts'
        path: 'mywebappbuildartifacts'
   
    # Deploy to Azure Web apps
    - name: 'Run Azure webapp deploy action using publish profile credentials'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: mywebapp-actions # Replace with your app name
        package: 'mywebappbuildartifacts'
        slot-name: 'dev'   
    

  deploy-QA:
    name: "Deploy To Azure QA env"
    runs-on: ubuntu-latest
    needs:
      - build-app
    environment:
      name: 'DEMO05_QA'
      url: 'https://mywebapp-actions-qa.azurewebsites.net'

    steps:
    - uses: actions/checkout@v2
    
    - name: Setup .NET Core 5
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.x
    
    - name: 'Login via Azure CLI'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v2.0.8
      with:
        name: 'mywebappbuildartifacts'
        path: 'mywebappbuildartifacts'
   
    # Deploy to Azure Web apps
    - name: 'Run Azure webapp deploy action using publish profile credentials'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: mywebapp-actions # Replace with your app name
        package: 'mywebappbuildartifacts'
        slot-name: 'qa'   
         
  deploy-PROD:
    name: "Deploy To Azure PROD env"
    runs-on: ubuntu-latest
    needs:
      - deploy-DEV
      - deploy-QA
    environment:
      name: 'DEMO05_PROD'
      url: 'https://mywebapp-actions.azurewebsites.net'

    steps:
    - uses: actions/checkout@v2
    
    - name: Setup .NET Core 5
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.x
    
    - name: 'Login via Azure CLI'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download a Build Artifact
      uses: actions/download-artifact@v2.0.8
      with:
        name: 'mywebappbuildartifacts'
        path: 'mywebappbuildartifacts'
   
    # Deploy to Azure Web apps
    - name: 'Run Azure webapp deploy action using publish profile credentials'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: mywebapp-actions # Replace with your app name
        package: 'mywebappbuildartifacts'
